<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeeklyEnglish Pro</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#4CAF50">
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
    <h1>📘 WeeklyEnglish Pro</h1>
    <p>Loading...</p>
</div>

<!-- Main App -->
<div id="app" class="hidden">

    <header>
        <h1>📘 WeeklyEnglish Pro</h1>
    </header>

    <!-- Name Section -->
    <section id="nameSection">
        <h2>Enter Your Name</h2>

        <input
            type="text"
            id="userName"
            placeholder="Your Name"
        >

        <button onclick="saveName()">
            Save Name
        </button>

        <p id="welcome"></p>
    </section>

    <!-- Topic Menu -->
    <section id="topicSection">

        <h2>Grammar Topics</h2>

        <div class="topics">
            
            <button class="topicBtn" onclick="loadTopic('noun')">Noun</button>
            <button class="topicBtn" onclick="loadTopic('pronoun')">Pronoun</button>
            <button class="topicBtn" onclick="loadTopic('verb')">Verb</button>
            <button class="topicBtn" onclick="loadTopic('adjective')">Adjective</button>
            <button class="topicBtn" onclick="loadTopic('adverb')">Adverb</button>
            <button class="topicBtn" onclick="loadTopic('tense')">Tense</button>
            <button class="topicBtn" onclick="loadTopic('articles')">Articles</button>
            <button class="topicBtn" onclick="loadTopic('prepositions')">Prepositions</button>
            <button class="topicBtn" onclick="loadTopic('conjunctions')">Conjunctions</button>
            <button class="topicBtn" onclick="loadTopic('interjections')">Interjections</button>

        </div>
    </section>

    <!-- Level Selection -->
    
    <section id="levelSection" class="hidden">
        
        <h2 id="levelTopicTitle">Select Level</h2>
        <div id="levelButtons"></div>
        <button onclick="goHome()">
        ⬅ Back
        </button>
    
    </section>

    <!-- Quiz Section -->
    <section id="quizSection" class="hidden">

        <h2 id="topicTitle"></h2>

        <div id="questionBox">
            <h3 id="question"></h3>

            <div id="options"></div>
        </div>

        <p id="progress"></p>

        <button id="nextBtn" onclick="nextQuestion()">
            Next
        </button>

    </section>

    <!-- Result Section -->
    <section id="resultSection" class="hidden">

        <h2>Quiz Result</h2>

        <p id="scoreText"></p>

        <button onclick="shareResult()">
            Share Result
        </button>

        <button onclick="goHome()">
            Back Home
        </button>

    </section>

    <!-- History Section -->
    <div id="historySection">

    <h2>📊 Result History</h2>

    <button onclick="clearResults()" class="dangerBtn">
        🗑️ Clear Results
    </button>

    <button onclick="resetProgress()">
    🔄 Reset Progress
    </button>

    <div id="historyList">
        No Results Yet
    </div>

</div>

</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
